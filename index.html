<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English জানালা | Home page</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- font awesome icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisyUI and tailwind css  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet  -->
    <link rel="stylesheet" href="styles/style.css" />

  </head>
  <body>
    <!-- navbar  -->
    <header class="bg-[#BADEFF35] shadow-sm max-w-[1280px] mx-auto px-5">
      <div class="navbar">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <div
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box gap-2 z-1 mt-3 w-52 p-2 shadow-sm"
            >
              <a class="btn" href=""
                ><i class="fa-solid fa-circle-question"></i> <span>FAQ</span></a
              >
              <a class="btn" href=""
                ><i class="fa-solid fa-book-open"></i><span>Learn</span></a
              >
              <a class="btn" href=""
                ><i class="fa-solid fa-arrow-right-from-bracket"></i
                ><span>Logout</span></a
              >
            </div>
          </div>
          <a class="flex items-center gap-1">
            <span class="text-lg font-bold gap-0">English</span>
            <img src="./assets/logo.png" alt="" />
            <span class="font-bangla text-lg font-semibold">জানালা</span>
          </a>
        </div>

        <div class="navbar-end hidden lg:flex gap-4">
          <a class="btn btn-outline btn-primary" href=""
            ><i class="fa-solid fa-circle-question"></i> <span>FAQ</span></a
          >
          <a class="btn btn-outline btn-primary" href=""
            ><i class="fa-solid fa-book-open"></i><span>Learn</span></a
          >
          <a class="btn btn-outline btn-primary" href=""
            ><i class="fa-solid fa-arrow-right-from-bracket"></i
            ><span>Logout</span></a
          >
        </div>
      </div>
    </header>

    <!-- body  -->
    <section
      class="flex flex-col-reverse md:flex-row justify-between items-center max-w-[1220px] mx-auto p-4 gap-8"
    >
      <div class="space-y-5 flex-1">
        <h2 class="text-5xl font-bold">
          <span class="text-[#00BCFF]">English</span> is Easy!!
        </h2>
        <p class="text-xl">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ
        </p>
        <div class="flex flex-col w-full md:max-w-md space-y-5">
          <input
            class="py-2 px-3 rounded-sm"
            type="text"
            placeholder="Enter Your Name"
          />
          <input
            class="py-2 px-3 rounded-sm"
            type="password"
            placeholder="....................."
          />
          <button class="btn btn-primary w-full md:w-[200px]">
            Get Started
          </button>
        </div>
      </div>
      <div class="flex-1">
        <img src="./assets/hero-student.png" alt="" />
      </div>
    </section>

    <!-- main section  -->
    <section class="py-5 ">
      <h2 class="text-4xl font-bold w-11/12 mx-auto text-center gap-2">
        <span class="text-[#00BCFF]"> Let's </span> Learn Vocabularies
      </h2>

      <div id="levels-container" class="flex items-center text-center justify-center gap-3 mt-12 flex-wrap">

      </div>
    </section>


    <section id="word-container" class="bg-gray-100 w-11/12 grid grid-cols-3 mx-auto p-6 my-12 gap-5">

    </section>
    

    <!-- script  -->
     <script src="script/script.js"></script>
  </body>
</html>
